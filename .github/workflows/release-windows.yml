name: Release Build - Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.1.0)'
        required: true
        default: '0.1.0'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-tauri-windows:
    name: Build Windows (x64)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          cache-targets: true

      - name: Cache Cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-tauri-2.0

      - name: Install frontend dependencies
        working-directory: crates/ui
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: crates/ui
        run: pnpm run build

      - name: Download llama-server sidecar
        shell: bash
        run: bash scripts/download-llama-server.sh

      - name: Install Tauri CLI
        run: |
          if (!(Get-Command cargo-tauri -ErrorAction SilentlyContinue)) {
            cargo install tauri-cli --version "^2.0"
          }
        shell: pwsh

      - name: Build gws sidecar (Google Workspace CLI)
        run: bash scripts/download-gws.sh --download --target x86_64-pc-windows-msvc
        shell: bash

      - name: Build Tauri App
        working-directory: crates/clawdesk-tauri
        run: cargo tauri build --target x86_64-pc-windows-msvc
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      # ── Normalize artifact names ────────────────────────────
      - name: Normalize Windows artifact names
        shell: bash
        run: |
          MSI_DIR="target/x86_64-pc-windows-msvc/release/bundle/msi"
          NSIS_DIR="target/x86_64-pc-windows-msvc/release/bundle/nsis"

          EXE=$(ls -1 "$NSIS_DIR"/*.exe 2>/dev/null | head -1 || true)
          if [[ -n "$EXE" ]]; then
            mv "$EXE" "$NSIS_DIR/ClawDesk_x64-setup.exe"
          fi

          NSIS_ZIP=$(ls -1 "$NSIS_DIR"/*.nsis.zip 2>/dev/null | head -1 || true)
          if [[ -n "$NSIS_ZIP" ]]; then
            mv "$NSIS_ZIP" "$NSIS_DIR/ClawDesk_x64-setup.nsis.zip"
            if [[ -f "${NSIS_ZIP}.sig" ]]; then
              mv "${NSIS_ZIP}.sig" "$NSIS_DIR/ClawDesk_x64-setup.nsis.zip.sig"
            fi
          fi

          MSI=$(ls -1 "$MSI_DIR"/*.msi 2>/dev/null | head -1 || true)
          if [[ -n "$MSI" ]]; then
            mv "$MSI" "$MSI_DIR/ClawDesk_x64_en-US.msi"
          fi

          MSI_ZIP=$(ls -1 "$MSI_DIR"/*.msi.zip 2>/dev/null | head -1 || true)
          if [[ -n "$MSI_ZIP" ]]; then
            mv "$MSI_ZIP" "$MSI_DIR/ClawDesk_x64_en-US.msi.zip"
            if [[ -f "${MSI_ZIP}.sig" ]]; then
              mv "${MSI_ZIP}.sig" "$MSI_DIR/ClawDesk_x64_en-US.msi.zip.sig"
            fi
          fi

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ClawDesk-x86_64-pc-windows-msvc
          path: |
            target/x86_64-pc-windows-msvc/release/bundle/msi/ClawDesk_x64_en-US.msi
            target/x86_64-pc-windows-msvc/release/bundle/msi/ClawDesk_x64_en-US.msi.zip
            target/x86_64-pc-windows-msvc/release/bundle/msi/ClawDesk_x64_en-US.msi.zip.sig
            target/x86_64-pc-windows-msvc/release/bundle/nsis/ClawDesk_x64-setup.exe
            target/x86_64-pc-windows-msvc/release/bundle/nsis/ClawDesk_x64-setup.nsis.zip
            target/x86_64-pc-windows-msvc/release/bundle/nsis/ClawDesk_x64-setup.nsis.zip.sig
          if-no-files-found: error

      - name: Create Release & Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          name: ClawDesk ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name || github.event.inputs.version, 'alpha') || contains(github.ref_name || github.event.inputs.version, 'beta') }}
          overwrite_files: true
          generate_release_notes: true
          files: |
            target/x86_64-pc-windows-msvc/release/bundle/msi/ClawDesk_x64_en-US.msi
            target/x86_64-pc-windows-msvc/release/bundle/nsis/ClawDesk_x64-setup.exe
            target/x86_64-pc-windows-msvc/release/bundle/nsis/ClawDesk_x64-setup.nsis.zip
            target/x86_64-pc-windows-msvc/release/bundle/nsis/ClawDesk_x64-setup.nsis.zip.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
