name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: clawdesk

permissions:
  contents: write

jobs:
  # ── Build Matrix ────────────────────────────────────────────

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-13
            artifact: clawdesk-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: clawdesk-darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: clawdesk-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: clawdesk-linux-arm64
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: clawdesk-windows-amd64.exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: clawdesk-windows-arm64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build release binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p clawdesk-cli
          else
            cargo build --release --target ${{ matrix.target }} -p clawdesk-cli
          fi
        shell: bash

      - name: Rename binary
        shell: bash
        run: |
          SRC="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            SRC="${SRC}.exe"
          fi
          cp "$SRC" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 1

  # ── macOS Universal Binary ──────────────────────────────────

  universal-macos:
    name: macOS Universal Binary
    needs: build
    runs-on: macos-14
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: clawdesk-darwin-amd64
      - uses: actions/download-artifact@v4
        with:
          name: clawdesk-darwin-arm64

      - name: Create universal binary
        run: |
          chmod +x clawdesk-darwin-amd64 clawdesk-darwin-arm64
          lipo -create -output clawdesk-darwin-universal \
            clawdesk-darwin-amd64 clawdesk-darwin-arm64
          chmod +x clawdesk-darwin-universal

      - name: Upload universal binary
        uses: actions/upload-artifact@v4
        with:
          name: clawdesk-darwin-universal
          path: clawdesk-darwin-universal

  # ── Test Matrix ─────────────────────────────────────────────

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-test-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --workspace --lib --tests

  # ── Release ─────────────────────────────────────────────────

  release:
    name: Create Release
    needs: [build, universal-macos, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f -name 'clawdesk-*' | while read f; do
            sha256sum "$f" >> checksums.sha256
          done
          # Clean up paths in checksum file
          sed -i 's|  \./[^/]*/|  |g' checksums.sha256
          cat checksums.sha256

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ClawDesk v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            artifacts/clawdesk-darwin-amd64/clawdesk-darwin-amd64
            artifacts/clawdesk-darwin-arm64/clawdesk-darwin-arm64
            artifacts/clawdesk-darwin-universal/clawdesk-darwin-universal
            artifacts/clawdesk-linux-amd64/clawdesk-linux-amd64
            artifacts/clawdesk-linux-arm64/clawdesk-linux-arm64
            artifacts/clawdesk-windows-amd64.exe/clawdesk-windows-amd64.exe
            artifacts/clawdesk-windows-arm64.exe/clawdesk-windows-arm64.exe
            artifacts/checksums.sha256

  # ── Verify Install Script ───────────────────────────────────

  verify-install:
    name: Verify Install Script
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - name: Test install script (dry run)
        run: |
          # Validate script syntax.
          bash -n scripts/install.sh
          echo "Install script syntax OK"
