name: Release CLI Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: clawdesk
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  # ── Build Matrix ────────────────────────────────────────────

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: clawdesk-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: clawdesk-darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: clawdesk-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: clawdesk-linux-arm64
            cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libasound2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build release binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p clawdesk-cli
          else
            cargo build --release --target ${{ matrix.target }} -p clawdesk-cli
          fi
        shell: bash

      - name: Build gws binary (Google Workspace CLI)
        if: matrix.cross != true
        run: bash scripts/download-gws.sh --download --target ${{ matrix.target }}
        shell: bash
        continue-on-error: true

      - name: Rename binary
        shell: bash
        run: |
          SRC="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"
          cp "$SRC" "${{ matrix.artifact }}"

      # ── macOS signing + notarization (skipped if cert secret absent) ──
      - name: Import Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [[ -z "$APPLE_CERTIFICATE" ]]; then
            echo "No APPLE_CERTIFICATE secret — skipping signing"
            exit 0
          fi
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Sign and notarize macOS CLI binary
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -z "$APPLE_CERTIFICATE" ]]; then
            echo "No APPLE_CERTIFICATE secret — skipping signing"
            exit 0
          fi
          BINARY="${{ matrix.artifact }}"
          chmod +x "$BINARY"

          # Sign with hardened runtime (required for notarization)
          codesign --force --options runtime --timestamp \
            --sign "Developer ID Application" \
            "$BINARY"
          codesign --verify --verbose=2 "$BINARY"
          echo "Signed: $BINARY"

          # Notarize — Apple records the signature; no stapling on plain binaries
          zip "${BINARY}.zip" "$BINARY"
          xcrun notarytool submit "${BINARY}.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 300 2>&1 | tee /tmp/notarize-cli.txt
          if grep -q 'status: Invalid' /tmp/notarize-cli.txt; then
            echo "::error::Notarization failed"
            exit 1
          fi
          rm "${BINARY}.zip"
          echo "Notarized: $BINARY"

      - name: Cleanup keychain
        if: runner.os == 'macOS' && always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          rm -f $RUNNER_TEMP/certificate.p12

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 1

  # ── macOS Universal Binary ──────────────────────────────────

  universal-macos:
    name: macOS Universal Binary
    needs: build
    runs-on: macos-14
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: clawdesk-darwin-amd64
      - uses: actions/download-artifact@v4
        with:
          name: clawdesk-darwin-arm64

      - name: Create universal binary
        run: |
          chmod +x clawdesk-darwin-amd64 clawdesk-darwin-arm64
          lipo -create -output clawdesk-darwin-universal \
            clawdesk-darwin-amd64 clawdesk-darwin-arm64
          chmod +x clawdesk-darwin-universal

      - name: Import Apple certificate (universal)
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [[ -z "$APPLE_CERTIFICATE" ]]; then
            echo "No APPLE_CERTIFICATE secret — skipping signing"
            exit 0
          fi
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Sign and notarize universal binary
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -z "$APPLE_CERTIFICATE" ]]; then
            echo "No APPLE_CERTIFICATE secret — skipping signing"
            exit 0
          fi
          codesign --force --options runtime --timestamp \
            --sign "Developer ID Application" \
            clawdesk-darwin-universal
          codesign --verify --verbose=2 clawdesk-darwin-universal

          zip clawdesk-darwin-universal.zip clawdesk-darwin-universal
          xcrun notarytool submit clawdesk-darwin-universal.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 300 2>&1 | tee /tmp/notarize-uni.txt
          if grep -q 'status: Invalid' /tmp/notarize-uni.txt; then
            echo "::error::Universal binary notarization failed"
            exit 1
          fi
          rm clawdesk-darwin-universal.zip
          echo "Universal binary signed and notarized"

      - name: Cleanup keychain (universal)
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          rm -f $RUNNER_TEMP/certificate.p12

      - name: Upload universal binary
        uses: actions/upload-artifact@v4
        with:
          name: clawdesk-darwin-universal
          path: clawdesk-darwin-universal

  # ── Release ─────────────────────────────────────────────────

  release:
    name: Create Release
    needs: [build, universal-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f -name 'clawdesk-*' | while read f; do
            sha256sum "$f" >> checksums.sha256
          done
          # Clean up paths in checksum file
          sed -i 's|  \./[^/]*/|  |g' checksums.sha256
          cat checksums.sha256

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ClawDesk v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          overwrite_files: true
          generate_release_notes: true
          files: |
            artifacts/clawdesk-darwin-amd64/clawdesk-darwin-amd64
            artifacts/clawdesk-darwin-arm64/clawdesk-darwin-arm64
            artifacts/clawdesk-darwin-universal/clawdesk-darwin-universal
            artifacts/clawdesk-linux-amd64/clawdesk-linux-amd64
            artifacts/clawdesk-linux-arm64/clawdesk-linux-arm64
            artifacts/checksums.sha256
            scripts/install.sh

  # ── Verify Install Script ───────────────────────────────────

  verify-install:
    name: Verify Install Script
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - name: Test install script (dry run)
        run: |
          # Validate script syntax.
          bash -n scripts/install.sh
          echo "Install script syntax OK"
