name: Release Build - Linux

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.1.0)'
        required: true
        default: '0.1.0'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-tauri-linux:
    name: Build Linux (x64)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          cache-targets: true

      - name: Cache Cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-tauri-2.0

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: crates/ui
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: crates/ui
        run: pnpm run build

      - name: Download llama-server sidecar
        run: bash scripts/download-llama-server.sh

      - name: Install Tauri CLI
        run: |
          if ! command -v cargo-tauri &> /dev/null; then
            cargo install tauri-cli --version "^2.0"
          fi

      - name: Build Tauri App
        working-directory: crates/clawdesk-tauri
        run: cargo tauri build --target x86_64-unknown-linux-gnu
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      # ── Normalize artifact names ────────────────────────────
      - name: Normalize Linux artifact names
        run: |
          APP_DIR="target/x86_64-unknown-linux-gnu/release/bundle/appimage"
          DEB_DIR="target/x86_64-unknown-linux-gnu/release/bundle/deb"

          APPIMAGE=$(ls -1 "$APP_DIR"/*.AppImage 2>/dev/null | head -1 || true)
          if [[ -n "$APPIMAGE" ]]; then
            mv "$APPIMAGE" "$APP_DIR/ClawDesk_amd64.AppImage"
          fi

          APPIMAGE_TGZ=$(ls -1 "$APP_DIR"/*.AppImage.tar.gz 2>/dev/null | head -1 || true)
          if [[ -n "$APPIMAGE_TGZ" ]]; then
            mv "$APPIMAGE_TGZ" "$APP_DIR/ClawDesk_amd64.AppImage.tar.gz"
            if [[ -f "${APPIMAGE_TGZ}.sig" ]]; then
              mv "${APPIMAGE_TGZ}.sig" "$APP_DIR/ClawDesk_amd64.AppImage.tar.gz.sig"
            fi
          fi

          APPIMAGE_SIG=$(ls -1 "$APP_DIR"/*.AppImage.sig 2>/dev/null | head -1 || true)
          if [[ -n "$APPIMAGE_SIG" ]]; then
            mv "$APPIMAGE_SIG" "$APP_DIR/ClawDesk_amd64.AppImage.sig"
          fi

          DEB=$(ls -1 "$DEB_DIR"/*.deb 2>/dev/null | head -1 || true)
          if [[ -n "$DEB" ]]; then
            mv "$DEB" "$DEB_DIR/ClawDesk_amd64.deb"
          fi

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ClawDesk-x86_64-unknown-linux-gnu
          path: |
            target/x86_64-unknown-linux-gnu/release/bundle/appimage/ClawDesk_amd64.AppImage
            target/x86_64-unknown-linux-gnu/release/bundle/appimage/ClawDesk_amd64.AppImage.tar.gz
            target/x86_64-unknown-linux-gnu/release/bundle/appimage/ClawDesk_amd64.AppImage.tar.gz.sig
            target/x86_64-unknown-linux-gnu/release/bundle/appimage/ClawDesk_amd64.AppImage.sig
            target/x86_64-unknown-linux-gnu/release/bundle/deb/ClawDesk_amd64.deb
          if-no-files-found: error

      - name: Create Release & Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          name: ClawDesk ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name || github.event.inputs.version, 'alpha') || contains(github.ref_name || github.event.inputs.version, 'beta') }}
          overwrite_files: true
          generate_release_notes: true
          files: |
            target/x86_64-unknown-linux-gnu/release/bundle/appimage/ClawDesk_amd64.AppImage
            target/x86_64-unknown-linux-gnu/release/bundle/appimage/ClawDesk_amd64.AppImage.tar.gz
            target/x86_64-unknown-linux-gnu/release/bundle/appimage/ClawDesk_amd64.AppImage.tar.gz.sig
            target/x86_64-unknown-linux-gnu/release/bundle/appimage/ClawDesk_amd64.AppImage.sig
            target/x86_64-unknown-linux-gnu/release/bundle/deb/ClawDesk_amd64.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
