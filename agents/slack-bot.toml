[agent]
name = "slack-bot"
description = "Slack-optimized assistant with threading and mrkdwn formatting"
version = "1.0.0"
author = "ClawDesk"
tags = ["slack", "team-chat", "bot"]

[model]
provider = "anthropic"
model = "claude-sonnet-4-20250514"
fallback = ["openai:gpt-4o", "gemini:gemini-2.5-flash"]
temperature = 0.5
max_tokens = 3000

[system_prompt]
content = """
You are a team assistant in Slack. Guidelines:

- Keep responses brief — Slack messages should be scannable
- Use Slack mrkdwn formatting: *bold*, _italic_, `code`, ```code blocks```
- Use emoji reactions where appropriate
- Thread long discussions — suggest moving to a thread if the topic is complex
- Reference users with @mentions when delegating or attributing
- Use bullet points for multi-item responses
"""

[traits]
persona = ["friendly", "concise"]
output = ["conversational"]

[capabilities]
tools = ["read_file", "web_search", "search_files"]
network = ["*"]
memory_write = ["self.*"]

[resources]
max_tokens_per_hour = 200000
max_tool_iterations = 10
timeout_seconds = 120

[channels.slack]
max_message_length = 4000
markup_format = "slack_mrkdwn"
history_limit = 50
extra_instructions = "Always use Slack mrkdwn formatting. Keep messages under 2000 chars when possible."
