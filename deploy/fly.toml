# =============================================================================
# ClawDesk — Fly.io deployment
# =============================================================================
#
# Deploy:
#   fly launch --config deploy/fly.toml
#   fly deploy --config deploy/fly.toml
#
# Secrets:
#   fly secrets set ANTHROPIC_API_KEY=sk-ant-...
#   fly secrets set OPENAI_API_KEY=sk-...
# =============================================================================

app = "clawdesk"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[env]
  RUST_LOG = "info"
  CLAWDESK_DATA_DIR = "/data"
  PORT = "18789"

[http_service]
  internal_port = 18789
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "GET"
  path = "/api/v1/health"
  timeout = "5s"

[mounts]
  source = "clawdesk_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
