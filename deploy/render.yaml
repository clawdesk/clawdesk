# =============================================================================
# ClawDesk — Render.com deployment
# =============================================================================
#
# Deploy: Connect your GitHub repo and Render auto-detects this file.
# Docs: https://render.com/docs/blueprint-spec
# =============================================================================

services:
  - type: web
    name: clawdesk
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /api/v1/health
    envVars:
      - key: RUST_LOG
        value: info
      - key: CLAWDESK_DATA_DIR
        value: /data
      - key: ANTHROPIC_API_KEY
        sync: false  # set manually in Render dashboard
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
    disk:
      name: clawdesk-data
      mountPath: /data
      sizeGB: 1
