<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Agent Claw icon">
  <title>Agent Claw</title>

  <defs>
    <clipPath id="clip">
      <rect x="64" y="64" width="896" height="896" rx="196" ry="196"/>
    </clipPath>

    <!-- Subtle macOS-like top highlight -->
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.35" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.18"/>
    </filter>

    <filter id="markShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Rounded-square tile -->
  <g filter="url(#softShadow)">
    <rect x="64" y="64" width="896" height="896" rx="196" ry="196" fill="#ffffff"/>
    <g clip-path="url(#clip)">
      <!-- Orange/white two-tone background (diagonal split) -->
      <polygon points="0,0 1024,0 0,1024" fill="#FF6A00"/>
      <rect x="64" y="64" width="896" height="420" fill="url(#glass)"/>
    </g>
    <rect x="64" y="64" width="896" height="896" rx="196" ry="196" fill="none" stroke="#0B0F14" stroke-opacity="0.07" stroke-width="6"/>
  </g>

  <!-- “Agent Claw” mark: an A-shaped claw + minimal fedora (agent cue) -->
  <g filter="url(#markShadow)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- White outline -->
    <g stroke="#ffffff" stroke-width="124">
      <!-- Fedora brim + crown -->
      <path d="M 382 320 C 452 262 572 262 642 320" />
      <path d="M 468 292 C 512 252 512 252 556 292" />

      <!-- A-shaped claw: left / right talons + center slash + crossbar -->
      <path d="M 356 784 C 296 610 326 438 506 288" />
      <path d="M 668 784 C 728 610 698 438 518 288" />
      <path d="M 512 820 C 484 650 488 486 512 342" />
      <path d="M 420 604 C 472 570 552 570 604 604" />
    </g>

    <!-- Orange core (keeps the outline readable on both orange + white background) -->
    <g stroke="#FF6A00" stroke-width="84">
      <path d="M 382 320 C 452 262 572 262 642 320" />
      <path d="M 468 292 C 512 252 512 252 556 292" />

      <path d="M 356 784 C 296 610 326 438 506 288" />
      <path d="M 668 784 C 728 610 698 438 518 288" />
      <path d="M 512 820 C 484 650 488 486 512 342" />
      <path d="M 420 604 C 472 570 552 570 604 604" />
    </g>
  </g>
</svg>