<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Agent Claw icon (discord style)">
  <title>Agent Claw Icon</title>

  <defs>
    <clipPath id="clip">
      <rect x="64" y="64" width="896" height="896" rx="210" ry="210"/>
    </clipPath>

    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF9A3B"/>
      <stop offset="0.55" stop-color="#FF6A00"/>
      <stop offset="1" stop-color="#E14200"/>
    </linearGradient>

    <radialGradient id="spot" cx="0.25" cy="0.15" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.34"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity="0.16"/>
    </filter>

    <filter id="markShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="14" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <g clip-path="url(#clip)" filter="url(#tileShadow)">
    <!-- background -->
    <rect x="64" y="64" width="896" height="896" fill="url(#bg)"/>
    <rect x="64" y="64" width="896" height="896" fill="url(#spot)"/>

    <!-- top glass highlight -->
    <path d="M64 64h896v300c-240 88-500 96-896 0V64z" fill="url(#glass)"/>

    <!-- the claw mark (simpler + better proportions) -->
    <g filter="url(#markShadow)" transform="translate(512 512) rotate(-16) translate(-512 -512)">
      <!-- subtle dark underlay for depth -->
      <g opacity="0.18">
        <path d="M418 300 C 386 470 378 640 370 780" fill="none" stroke="#000000" stroke-width="84" stroke-linecap="round"/>
        <path d="M540 285 C 512 465 506 650 494 808" fill="none" stroke="#000000" stroke-width="84" stroke-linecap="round"/>
        <path d="M662 312 C 642 486 636 668 626 824" fill="none" stroke="#000000" stroke-width="84" stroke-linecap="round"/>
      </g>

      <!-- main scratches -->
      <g>
        <path d="M418 300 C 386 470 378 640 370 780" fill="none" stroke="#ffffff" stroke-width="76" stroke-linecap="round"/>
        <path d="M540 285 C 512 465 506 650 494 808" fill="none" stroke="#ffffff" stroke-width="76" stroke-linecap="round"/>
        <path d="M662 312 C 642 486 636 668 626 824" fill="none" stroke="#ffffff" stroke-width="76" stroke-linecap="round"/>
      </g>

      <!-- tiny chips so it reads like "scratches" -->
      <g opacity="0.78">
        <path d="M394 520 l-34 30" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>
        <path d="M518 560 l-34 30" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>
        <path d="M642 592 l-34 30" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>
      </g>
    </g>

    <!-- subtle bottom depth -->
    <linearGradient id="bottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.62" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.16"/>
    </linearGradient>
    <rect x="64" y="64" width="896" height="896" fill="url(#bottom)"/>

    <!-- inner edge highlight -->
    <rect x="80" y="80" width="864" height="864" rx="198" ry="198"
          fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="8"/>
  </g>
</svg>
