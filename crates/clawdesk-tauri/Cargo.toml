[package]
name = "clawdesk-tauri"
description = "Tauri 2.0 desktop application shell for ClawDesk"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
name = "clawdesk_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[features]
default = ["sandbox", "tunnel", "mcp", "extensions", "migrate", "memory", "observability", "discovery", "threads"]
sandbox = ["dep:clawdesk-sandbox"]
tunnel = ["dep:clawdesk-tunnel"]
mcp = ["dep:clawdesk-mcp"]
extensions = ["dep:clawdesk-extensions"]
migrate = ["dep:clawdesk-migrate"]
memory = ["dep:clawdesk-memory"]
observability = ["dep:clawdesk-observability"]
discovery = ["dep:clawdesk-discovery"]
threads = ["dep:clawdesk-threads"]
full = ["sandbox", "tunnel", "mcp", "extensions", "migrate", "memory", "observability", "discovery", "threads"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
clawdesk-types = { workspace = true }
clawdesk-storage = { workspace = true }
clawdesk-sochdb = { workspace = true }
sochdb = { workspace = true }
clawdesk-channel = { workspace = true }
clawdesk-channels = { workspace = true }
clawdesk-providers = { workspace = true }
clawdesk-agents = { workspace = true }
clawdesk-cron = { workspace = true }
clawdesk-bus = { workspace = true }
clawdesk-gateway = { workspace = true }
clawdesk-browser = { workspace = true }
clawdesk-security = { workspace = true }
clawdesk-tunnel = { workspace = true, optional = true }
clawdesk-domain = { workspace = true }
clawdesk-skills = { workspace = true }
clawdesk-runtime = { workspace = true }
clawdesk-media = { workspace = true }
clawdesk-plugin = { workspace = true }
clawdesk-acp = { workspace = true }
clawdesk-discovery = { workspace = true, optional = true }
clawdesk-observability = { workspace = true, optional = true }
clawdesk-infra = { workspace = true }
clawdesk-memory = { workspace = true, optional = true }
clawdesk-threads = { workspace = true, optional = true }
clawdesk-sandbox = { workspace = true, optional = true }
clawdesk-mcp = { workspace = true, optional = true }
clawdesk-extensions = { workspace = true, optional = true }
clawdesk-migrate = { workspace = true, optional = true }
clawdesk-canvas = { workspace = true }
clawdesk-planner = { workspace = true }
clawdesk-local-models = { workspace = true }
clawdesk-rag = { workspace = true }
base64 = { workspace = true }
tauri = { version = "2", features = ["tray-icon", "image-png"] }
tauri-plugin-shell = "2"
tauri-plugin-autostart = { path = "../../../plugins-workspace/plugins/autostart" }
tauri-plugin-single-instance = { path = "../../../plugins-workspace/plugins/single-instance" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tokio-util = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
async-trait = { workspace = true }
parking_lot = { workspace = true }
dashmap = { workspace = true }
aho-corasick = { workspace = true }
lru = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
futures = { workspace = true }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile = "3"
