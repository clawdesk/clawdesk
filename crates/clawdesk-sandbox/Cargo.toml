[package]
name = "clawdesk-sandbox"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Multi-modal sandbox isolation for ClawDesk agent tool execution"

[features]
default = ["subprocess", "workspace"]
sandbox-docker = []
sandbox-wasm = []
subprocess = []
workspace = []

[dependencies]
# Internal
clawdesk-types = { workspace = true }

# Async
tokio = { workspace = true, features = ["process", "fs"] }
async-trait = { workspace = true }

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }

# Observability
tracing = { workspace = true }

# Utilities
uuid = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }

[target.'cfg(target_os = "linux")'.dependencies]
libc = "0.2"

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "macros"] }
tempfile = "3"
