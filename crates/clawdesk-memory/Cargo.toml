[package]
name = "clawdesk-memory"
description = "Memory & embeddings — vector search, hybrid retrieval, embedding providers, sync pipeline"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
clawdesk-types = { workspace = true }
clawdesk-storage = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["fs"] }
tracing = { workspace = true }
reqwest = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
futures = { workspace = true }
sha2 = { workspace = true }
lru = { workspace = true }
parking_lot = { workspace = true }

# MemoryBackend integration — enables atomic writes, graph, temporal,
# policy, and trace capabilities when the backend supports them.
# The MemoryBackend trait is defined in clawdesk-storage; this dep
# is only for the concrete types (no circular dependency).
# clawdesk-sochdb = { workspace = true, optional = true }

[dev-dependencies]
tempfile = "3"
