[package]
name = "clawdesk-types"
description = "Zero-dependency core types for ClawDesk: message enums, config types, error algebra"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
thiserror = { workspace = true }
aho-corasick = { workspace = true }

[features]
default = []
## Enable lightweight lock-ordering telemetry in release builds.
## Adds ~2 AtomicU64 increments per lock acquisition (negligible overhead).
lock-telemetry = []

[dev-dependencies]
proptest = "1"
