<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowIndigo" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#818cf8"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrowPink" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f472b6"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="550" y="45" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700" letter-spacing="1">
    🔭 Peekaboo — Standalone macOS Automation Flow
  </text>
  <text x="550" y="68" text-anchor="middle" fill="#94a3b8" font-size="13">
    Screen capture, UI element detection, and AI-powered GUI automation on macOS Sequoia+
  </text>

  <!-- ═══════════════ ROW 1: User Input ═══════════════ -->
  <rect x="390" y="90" width="320" height="60" rx="12" fill="url(#cardGrad)" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="550" y="117" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="600">USER / AI CLIENT</text>
  <text x="550" y="135" text-anchor="middle" fill="#94a3b8" font-size="10">CLI command · MCP message · Swift API call</text>

  <!-- Arrow down -->
  <line x1="550" y1="150" x2="550" y2="185" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowIndigo)"/>

  <!-- ═══════════════ ROW 2: Entry Points ═══════════════ -->
  <!-- CLI -->
  <rect x="80" y="185" width="200" height="55" rx="10" fill="url(#cardGrad)" stroke="#6366f1" stroke-width="1" filter="url(#shadow)"/>
  <text x="180" y="210" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="600">⌨️  Peekaboo CLI</text>
  <text x="180" y="227" text-anchor="middle" fill="#64748b" font-size="9">see · click · type · image · agent</text>

  <!-- MCP Server -->
  <rect x="320" y="185" width="200" height="55" rx="10" fill="url(#cardGrad)" stroke="#06b6d4" stroke-width="1" filter="url(#shadow)"/>
  <text x="420" y="210" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="600">🔌  MCP Server</text>
  <text x="420" y="227" text-anchor="middle" fill="#64748b" font-size="9">stdio · JSON-RPC 2.0</text>

  <!-- Swift API -->
  <rect x="560" y="185" width="200" height="55" rx="10" fill="url(#cardGrad)" stroke="#8b5cf6" stroke-width="1" filter="url(#shadow)"/>
  <text x="660" y="210" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">🧩  Swift API</text>
  <text x="660" y="227" text-anchor="middle" fill="#64748b" font-size="9">PeekabooCore · PeekabooBridge</text>

  <!-- Agent Script -->
  <rect x="800" y="185" width="200" height="55" rx="10" fill="url(#cardGrad)" stroke="#f59e0b" stroke-width="1" filter="url(#shadow)"/>
  <text x="900" y="210" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="600">📜  Script Runner</text>
  <text x="900" y="227" text-anchor="middle" fill="#64748b" font-size="9">.peekaboo.json workflows</text>

  <!-- Arrows from entry points down -->
  <line x1="180" y1="240" x2="180" y2="280" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>
  <line x1="420" y1="240" x2="420" y2="280" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowCyan)"/>
  <line x1="660" y1="240" x2="660" y2="280" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>
  <line x1="900" y1="240" x2="900" y2="280" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- Horizontal connector -->
  <line x1="180" y1="280" x2="900" y2="280" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="550" y1="280" x2="550" y2="310" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowIndigo)"/>

  <!-- ═══════════════ ROW 3: PeekabooServices Orchestrator ═══════════════ -->
  <rect x="250" y="310" width="600" height="60" rx="12" fill="url(#cardGrad)" stroke="url(#accentGrad)" stroke-width="2" filter="url(#shadow)"/>
  <rect x="250" y="310" width="600" height="5" rx="3" fill="url(#accentGrad)"/>
  <text x="550" y="342" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">PeekabooServices  @MainActor</text>
  <text x="550" y="359" text-anchor="middle" fill="#94a3b8" font-size="10">Central service locator · coordinates all automation services</text>

  <!-- Arrows from orchestrator to services -->
  <line x1="330" y1="370" x2="180" y2="420" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="440" y1="370" x2="400" y2="420" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="550" y1="370" x2="550" y2="420" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="660" y1="370" x2="700" y2="420" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="770" y1="370" x2="900" y2="420" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- ═══════════════ ROW 4: Core Services ═══════════════ -->
  <!-- Screen Capture -->
  <rect x="80" y="420" width="200" height="65" rx="10" fill="url(#cardGrad)" stroke="#10b981" stroke-width="1" filter="url(#shadow)"/>
  <text x="180" y="447" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">📸 ScreenCaptureService</text>
  <text x="180" y="462" text-anchor="middle" fill="#64748b" font-size="9">ScreenCaptureKit + CGWindowList</text>
  <text x="180" y="475" text-anchor="middle" fill="#64748b" font-size="9">PNG/JPEG · Retina 2x · Area/Window/Screen</text>

  <!-- UI Automation -->
  <rect x="310" y="420" width="180" height="65" rx="10" fill="url(#cardGrad)" stroke="#10b981" stroke-width="1" filter="url(#shadow)"/>
  <text x="400" y="447" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">🤖 UIAutomationService</text>
  <text x="400" y="462" text-anchor="middle" fill="#64748b" font-size="9">see · click · type · scroll</text>
  <text x="400" y="475" text-anchor="middle" fill="#64748b" font-size="9">element detection + caching</text>

  <!-- Snapshot Manager -->
  <rect x="510" y="420" width="160" height="65" rx="10" fill="url(#cardGrad)" stroke="#10b981" stroke-width="1" filter="url(#shadow)"/>
  <text x="590" y="447" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">🗂 SnapshotManager</text>
  <text x="590" y="462" text-anchor="middle" fill="#64748b" font-size="9">element state cache</text>
  <text x="590" y="475" text-anchor="middle" fill="#64748b" font-size="9">~1.5s TTL per window</text>

  <!-- App/Window Mgmt -->
  <rect x="690" y="420" width="160" height="65" rx="10" fill="url(#cardGrad)" stroke="#10b981" stroke-width="1" filter="url(#shadow)"/>
  <text x="770" y="447" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">🪟 WindowService</text>
  <text x="770" y="462" text-anchor="middle" fill="#64748b" font-size="9">focus · move · resize</text>
  <text x="770" y="475" text-anchor="middle" fill="#64748b" font-size="9">app · dock · menu · dialog</text>

  <!-- Agent Runtime -->
  <rect x="870" y="420" width="160" height="65" rx="10" fill="url(#cardGrad)" stroke="#f59e0b" stroke-width="1" filter="url(#shadow)"/>
  <text x="950" y="447" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">🧠 AgentService</text>
  <text x="950" y="462" text-anchor="middle" fill="#64748b" font-size="9">NL task execution</text>
  <text x="950" y="475" text-anchor="middle" fill="#64748b" font-size="9">multi-step chaining via LLM</text>

  <!-- ═══════════════ ROW 5: macOS APIs ═══════════════ -->
  <line x1="180" y1="485" x2="180" y2="535" stroke="#f472b6" stroke-width="1.5" marker-end="url(#arrowPink)"/>
  <line x1="400" y1="485" x2="400" y2="535" stroke="#f472b6" stroke-width="1.5" marker-end="url(#arrowPink)"/>
  <line x1="770" y1="485" x2="770" y2="535" stroke="#f472b6" stroke-width="1.5" marker-end="url(#arrowPink)"/>
  <line x1="950" y1="485" x2="950" y2="535" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- macOS layer -->
  <rect x="60" y="535" width="880" height="60" rx="12" fill="#1a1a2e" stroke="#ec4899" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="535" width="880" height="5" rx="3" fill="url(#pinkGrad)"/>
  <text x="500" y="562" text-anchor="middle" fill="#f9a8d4" font-size="13" font-weight="700"> macOS Sequoia APIs</text>
  <text x="500" y="580" text-anchor="middle" fill="#94a3b8" font-size="10">Accessibility (AX) API  ·  CGWindowList  ·  ScreenCaptureKit  ·  CGEvent  ·  NSWorkspace  ·  AppKit</text>

  <!-- Arrow to AI -->
  <line x1="950" y1="535" x2="950" y2="510" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="1015" y="515" fill="#fbbf24" font-size="9" text-anchor="middle">LLM call</text>

  <!-- ═══════════════ ROW 6: AI Providers ═══════════════ -->
  <rect x="60" y="620" width="880" height="55" rx="12" fill="url(#cardGrad)" stroke="#f59e0b" stroke-width="1" filter="url(#shadow)"/>
  <text x="500" y="645" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="600">🌐 Tachikoma — Multi-Provider AI Engine</text>
  <text x="500" y="662" text-anchor="middle" fill="#94a3b8" font-size="10">OpenAI  ·  Anthropic  ·  Grok  ·  Google Gemini  ·  Ollama (local)</text>
  <line x1="500" y1="595" x2="500" y2="620" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- ═══════════════ ROW 7: Output ═══════════════ -->
  <line x1="500" y1="675" x2="500" y2="710" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowCyan)"/>

  <rect x="150" y="710" width="700" height="90" rx="12" fill="url(#cardGrad)" stroke="#06b6d4" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="150" y="710" width="700" height="5" rx="3" fill="url(#cyanGrad)"/>
  <text x="500" y="738" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="700">📤 Output</text>

  <!-- Output items -->
  <rect x="175" y="750" width="130" height="35" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="240" y="772" text-anchor="middle" fill="#94a3b8" font-size="10">PNG / JPEG image</text>

  <rect x="320" y="750" width="150" height="35" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="395" y="772" text-anchor="middle" fill="#94a3b8" font-size="10">JSON UI element map</text>

  <rect x="485" y="750" width="140" height="35" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="555" y="772" text-anchor="middle" fill="#94a3b8" font-size="10">Snapshot (elem IDs)</text>

  <rect x="640" y="750" width="185" height="35" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="732" y="772" text-anchor="middle" fill="#94a3b8" font-size="10">Action result + confirmation</text>

  <!-- Legend -->
  <text x="60" y="815" fill="#64748b" font-size="9">Peekaboo v3.0 — macOS 15.0+ · Apple Silicon / Intel · Swift 6.2 · ScreenCaptureKit · Accessibility API</text>
</svg>