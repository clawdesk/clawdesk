<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" font-family="'Inter', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="layer1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#818cf8"/></linearGradient>
    <linearGradient id="layer2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>
    <linearGradient id="layer3" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#22d3ee"/></linearGradient>
    <linearGradient id="layer4" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#34d399"/></linearGradient>
    <linearGradient id="layer5" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#fbbf24"/></linearGradient>
    <linearGradient id="layer6" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#f87171"/></linearGradient>
    <linearGradient id="layer7" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient>
    <linearGradient id="evalGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ef4444" stop-opacity="0.15"/><stop offset="100%" stop-color="#ef4444" stop-opacity="0.03"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M1,1 L4,7 L7,1" fill="none" stroke="#94a3b8" stroke-width="1.5"/></marker>
    <marker id="arrowUp" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M1,7 L4,1 L7,7" fill="none" stroke="#ef4444" stroke-width="1.5"/></marker>
    <marker id="arrowRight" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M1,1 L7,4 L1,7" fill="none" stroke="#94a3b8" stroke-width="1.5"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1600" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" fill="#f1f5f9" font-size="28" font-weight="700">ClawDesk — 7-Layer AI Engineering Architecture</text>
  <text x="600" y="78" text-anchor="middle" fill="#64748b" font-size="14">Transport-agnostic agent execution across Desktop · CLI · Gateway · TMUX</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- USER INPUT -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="440" y="100" width="320" height="48" rx="24" fill="#1e293b" stroke="#334155" filter="url(#shadow)"/>
  <circle cx="470" cy="124" r="12" fill="#6366f1"/>
  <text x="470" cy="124" text-anchor="middle" fill="white" font-size="11" font-weight="700" dy="4">U</text>
  <text x="500" y="130" fill="#e2e8f0" font-size="14" font-weight="600">User Prompt</text>
  <text x="680" y="130" fill="#64748b" font-size="11">Desktop / CLI / Gateway / TMUX</text>

  <!-- Arrow down from user to Layer 1 -->
  <line x1="600" y1="148" x2="600" y2="178" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- EVALUATION LOOP (vertical bar on left) -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="60" y="170" width="60" height="850" rx="10" fill="url(#evalGrad)" stroke="#ef4444" stroke-opacity="0.3" stroke-dasharray="6,4"/>
  <text x="90" y="600" fill="#ef4444" font-size="12" font-weight="700" transform="rotate(-90 90 600)" text-anchor="middle" letter-spacing="2">EVALUATION LOOP</text>

  <!-- Eval feedback arrows (right side, going back up) -->
  <path d="M 1040 990 Q 1080 990 1080 600 Q 1080 210 1040 210" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowUp)" opacity="0.6"/>
  <text x="1100" y="600" fill="#ef4444" font-size="10" font-weight="600" transform="rotate(90 1100 600)" text-anchor="middle">Re-enter on failure</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- LAYER 1: PROMPT ENGINEERING -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <g transform="translate(140, 180)">
    <rect width="860" height="110" rx="12" fill="#1e293b" stroke="url(#layer1)" stroke-width="2" filter="url(#shadow)"/>
    <rect width="8" height="110" rx="4" fill="url(#layer1)"/>
    <text x="28" y="30" fill="url(#layer1)" font-size="11" font-weight="700" letter-spacing="2">LAYER 1</text>
    <text x="28" y="52" fill="#f1f5f9" font-size="18" font-weight="700">Prompt Engineering</text>
    <text x="28" y="70" fill="#94a3b8" font-size="12">What to do</text>
    <text x="28" y="95" fill="#64748b" font-size="11">PromptBudget · PromptAssembler (5 stages) · Persona/Soul · PromptTrace · A/B Experiments</text>
    <!-- Crate badges -->
    <rect x="560" y="18" width="130" height="22" rx="6" fill="#312e81" opacity="0.6"/>
    <text x="625" y="33" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600">clawdesk-domain</text>
    <rect x="700" y="18" width="140" height="22" rx="6" fill="#312e81" opacity="0.6"/>
    <text x="770" y="33" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600">clawdesk-agents</text>
    <!-- Score -->
    <rect x="780" y="70" width="60" height="26" rx="8" fill="#6366f1" opacity="0.2"/>
    <text x="810" y="88" text-anchor="middle" fill="#818cf8" font-size="13" font-weight="700">10/10</text>
  </g>

  <!-- Arrow -->
  <line x1="600" y1="290" x2="600" y2="310" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- LAYER 2: CONTEXT ENGINEERING -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <g transform="translate(140, 315)">
    <rect width="860" height="110" rx="12" fill="#1e293b" stroke="url(#layer2)" stroke-width="2" filter="url(#shadow)"/>
    <rect width="8" height="110" rx="4" fill="url(#layer2)"/>
    <text x="28" y="30" fill="url(#layer2)" font-size="11" font-weight="700" letter-spacing="2">LAYER 2</text>
    <text x="28" y="52" fill="#f1f5f9" font-size="18" font-weight="700">Context Engineering</text>
    <text x="28" y="70" fill="#94a3b8" font-size="12">What to know while doing</text>
    <text x="28" y="95" fill="#64748b" font-size="11">ContextGuard (P² quantile) · 3-tier Compaction · ProactiveScheduler (EWMA) · RAG · MemoryRecall · Bootstrap</text>
    <rect x="560" y="18" width="130" height="22" rx="6" fill="#1e3a5f" opacity="0.6"/>
    <text x="625" y="33" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">clawdesk-domain</text>
    <rect x="700" y="18" width="110" height="22" rx="6" fill="#1e3a5f" opacity="0.6"/>
    <text x="755" y="33" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">clawdesk-rag</text>
    <rect x="780" y="70" width="60" height="26" rx="8" fill="#3b82f6" opacity="0.2"/>
    <text x="810" y="88" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="700">10/10</text>
  </g>

  <line x1="600" y1="425" x2="600" y2="445" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- LAYER 3: INTENT ENGINEERING -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <g transform="translate(140, 450)">
    <rect width="860" height="110" rx="12" fill="#1e293b" stroke="url(#layer3)" stroke-width="2" filter="url(#shadow)"/>
    <rect width="8" height="110" rx="4" fill="url(#layer3)"/>
    <text x="28" y="30" fill="url(#layer3)" font-size="11" font-weight="700" letter-spacing="2">LAYER 3</text>
    <text x="28" y="52" fill="#f1f5f9" font-size="18" font-weight="700">Intent Engineering</text>
    <text x="28" y="70" fill="#94a3b8" font-size="12">What to want while doing</text>
    <text x="28" y="95" fill="#64748b" font-size="11">IntentTracker · DriftDetection · GoalDecomposition · DTGG (DAG rewriting) · HEFT scheduler · FailoverController</text>
    <rect x="560" y="18" width="140" height="22" rx="6" fill="#164e63" opacity="0.6"/>
    <text x="630" y="33" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">clawdesk-agents</text>
    <rect x="710" y="18" width="130" height="22" rx="6" fill="#164e63" opacity="0.6"/>
    <text x="775" y="33" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">clawdesk-planner</text>
    <rect x="780" y="70" width="60" height="26" rx="8" fill="#06b6d4" opacity="0.2"/>
    <text x="810" y="88" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="700">10/10</text>
  </g>

  <line x1="600" y1="560" x2="600" y2="580" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- LAYER 4: JUDGMENT ENGINEERING -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <g transform="translate(140, 585)">
    <rect width="860" height="110" rx="12" fill="#1e293b" stroke="url(#layer4)" stroke-width="2" filter="url(#shadow)"/>
    <rect width="8" height="110" rx="4" fill="url(#layer4)"/>
    <text x="28" y="30" fill="url(#layer4)" font-size="11" font-weight="700" letter-spacing="2">LAYER 4</text>
    <text x="28" y="52" fill="#f1f5f9" font-size="18" font-weight="700">Judgment Engineering</text>
    <text x="28" y="70" fill="#94a3b8" font-size="12">What to doubt while doing</text>
    <text x="28" y="95" fill="#64748b" font-size="11">CascadeScanner (AC+Regex+AST) · PolicyDSL (TOML) · PolicyEngine · ApprovalGate · SandboxGate · ask_human</text>
    <rect x="560" y="18" width="140" height="22" rx="6" fill="#064e3b" opacity="0.6"/>
    <text x="630" y="33" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">clawdesk-security</text>
    <rect x="710" y="18" width="130" height="22" rx="6" fill="#064e3b" opacity="0.6"/>
    <text x="775" y="33" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">clawdesk-domain</text>
    <rect x="780" y="70" width="60" height="26" rx="8" fill="#10b981" opacity="0.2"/>
    <text x="810" y="88" text-anchor="middle" fill="#34d399" font-size="13" font-weight="700">10/10</text>
  </g>

  <line x1="600" y1="695" x2="600" y2="715" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- LAYER 5: COHERENCE ENGINEERING -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <g transform="translate(140, 720)">
    <rect width="860" height="110" rx="12" fill="#1e293b" stroke="url(#layer5)" stroke-width="2" filter="url(#shadow)"/>
    <rect width="8" height="110" rx="4" fill="url(#layer5)"/>
    <text x="28" y="30" fill="url(#layer5)" font-size="11" font-weight="700" letter-spacing="2">LAYER 5</text>
    <text x="28" y="52" fill="#f1f5f9" font-size="18" font-weight="700">Coherence Engineering</text>
    <text x="28" y="70" fill="#94a3b8" font-size="12">What to become while doing</text>
    <text x="28" y="95" fill="#64748b" font-size="11">IdentityContract (SHA-256) · ChannelAdaptation (6 profiles) · PersonaRotator · ProfileRotator · ExpressionProfile</text>
    <rect x="560" y="18" width="140" height="22" rx="6" fill="#78350f" opacity="0.4"/>
    <text x="630" y="33" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">clawdesk-agents</text>
    <rect x="710" y="18" width="140" height="22" rx="6" fill="#78350f" opacity="0.4"/>
    <text x="780" y="33" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">clawdesk-security</text>
    <rect x="780" y="70" width="60" height="26" rx="8" fill="#f59e0b" opacity="0.2"/>
    <text x="810" y="88" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">10/10</text>
  </g>

  <line x1="600" y1="830" x2="600" y2="850" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- LAYER 6: EVALUATION ENGINEERING -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <g transform="translate(140, 855)">
    <rect width="860" height="130" rx="12" fill="#1e293b" stroke="url(#layer6)" stroke-width="2" filter="url(#shadow)"/>
    <rect width="8" height="130" rx="4" fill="url(#layer6)"/>
    <text x="28" y="30" fill="url(#layer6)" font-size="11" font-weight="700" letter-spacing="2">LAYER 6</text>
    <text x="28" y="52" fill="#f1f5f9" font-size="18" font-weight="700">Evaluation Engineering</text>
    <text x="28" y="70" fill="#94a3b8" font-size="12">How to know while doing — autonomous eval loop</text>
    <text x="28" y="95" fill="#64748b" font-size="11">QualityGate (ToolSuccessRate · TokenBudget · SecurityClean) · OutcomeLabeler (auto reward) · EvalPipeline</text>
    <text x="28" y="115" fill="#64748b" font-size="11">LoopDecision (Continue · Reenter(layer) · Abort) · TurnRouter (LinUCB bandit) · EvalHarness (pass@k)</text>
    <rect x="560" y="18" width="140" height="22" rx="6" fill="#7f1d1d" opacity="0.4"/>
    <text x="630" y="33" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">clawdesk-agents</text>
    <rect x="710" y="18" width="155" height="22" rx="6" fill="#7f1d1d" opacity="0.4"/>
    <text x="787" y="33" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">clawdesk-observability</text>
    <rect x="780" y="90" width="60" height="26" rx="8" fill="#ef4444" opacity="0.2"/>
    <text x="810" y="108" text-anchor="middle" fill="#f87171" font-size="13" font-weight="700">10/10</text>
  </g>

  <line x1="600" y1="985" x2="600" y2="1010" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- LAYER 7: HARNESS ENGINEERING -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <g transform="translate(140, 1015)">
    <rect width="860" height="130" rx="12" fill="#1e293b" stroke="url(#layer7)" stroke-width="2" filter="url(#shadow)"/>
    <rect width="8" height="130" rx="4" fill="url(#layer7)"/>
    <text x="28" y="30" fill="url(#layer7)" font-size="11" font-weight="700" letter-spacing="2">LAYER 7</text>
    <text x="28" y="52" fill="#f1f5f9" font-size="18" font-weight="700">Harness Engineering</text>
    <text x="28" y="70" fill="#94a3b8" font-size="12">Where and how to do — runtime infrastructure</text>
    <text x="28" y="95" fill="#64748b" font-size="11">AgentRunner (6-stage pipeline) · ToolRegistry · ProviderNegotiator · EventBus (WFQ) · SubAgentManager</text>
    <text x="28" y="115" fill="#64748b" font-size="11">DurableAgentRunner · Checkpoint/Recovery · MCP Bridge · SessionLaneManager · LLM Semaphore</text>
    <rect x="500" y="18" width="130" height="22" rx="6" fill="#4c1d95" opacity="0.4"/>
    <text x="565" y="33" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">clawdesk-runtime</text>
    <rect x="640" y="18" width="100" height="22" rx="6" fill="#4c1d95" opacity="0.4"/>
    <text x="690" y="33" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">clawdesk-bus</text>
    <rect x="750" y="18" width="100" height="22" rx="6" fill="#4c1d95" opacity="0.4"/>
    <text x="800" y="33" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">clawdesk-mcp</text>
    <rect x="780" y="90" width="60" height="26" rx="8" fill="#8b5cf6" opacity="0.2"/>
    <text x="810" y="108" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">10/10</text>
  </g>

  <!-- Arrow to output -->
  <line x1="600" y1="1145" x2="600" y2="1175" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- FINAL OUTPUT -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="440" y="1180" width="320" height="48" rx="24" fill="#1e293b" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="470" cy="1204" r="12" fill="#22c55e"/>
  <text x="470" y="1208" text-anchor="middle" fill="white" font-size="11" font-weight="700">✓</text>
  <text x="500" y="1210" fill="#e2e8f0" font-size="14" font-weight="600">Final Output</text>
  <text x="660" y="1210" fill="#64748b" font-size="11">Response + Tool results + Files</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- TRANSPORT LAYER (bottom) -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <g transform="translate(100, 1270)">
    <rect width="1000" height="90" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
    <text x="500" y="24" text-anchor="middle" fill="#64748b" font-size="11" font-weight="700" letter-spacing="2">TRANSPORT LAYER — clawdesk-core (EventSink trait)</text>
    <!-- Four transport boxes -->
    <rect x="40" y="38" width="200" height="40" rx="8" fill="#1e293b" stroke="#4f46e5" stroke-width="1"/>
    <text x="140" y="63" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="600">Tauri Desktop (IPC)</text>
    <rect x="270" y="38" width="200" height="40" rx="8" fill="#1e293b" stroke="#4f46e5" stroke-width="1"/>
    <text x="370" y="63" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="600">CLI + TMUX (stdin)</text>
    <rect x="500" y="38" width="200" height="40" rx="8" fill="#1e293b" stroke="#4f46e5" stroke-width="1"/>
    <text x="600" y="63" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="600">Gateway (HTTP/WS)</text>
    <rect x="730" y="38" width="230" height="40" rx="8" fill="#1e293b" stroke="#4f46e5" stroke-width="1"/>
    <text x="845" y="63" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="600">A2A Protocol (Agent-to-Agent)</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- STORAGE LAYER (very bottom) -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <g transform="translate(100, 1390)">
    <rect width="1000" height="70" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="500" y="22" text-anchor="middle" fill="#64748b" font-size="11" font-weight="700" letter-spacing="2">STORAGE</text>
    <rect x="40" y="32" width="200" height="30" rx="6" fill="#1e293b"/>
    <text x="140" y="52" text-anchor="middle" fill="#94a3b8" font-size="11">SochDB (ACID + HNSW)</text>
    <rect x="270" y="32" width="200" height="30" rx="6" fill="#1e293b"/>
    <text x="370" y="52" text-anchor="middle" fill="#94a3b8" font-size="11">Per-Chat Project FS</text>
    <rect x="500" y="32" width="200" height="30" rx="6" fill="#1e293b"/>
    <text x="600" y="52" text-anchor="middle" fill="#94a3b8" font-size="11">MemoryManager (vectors)</text>
    <rect x="730" y="32" width="230" height="30" rx="6" fill="#1e293b"/>
    <text x="845" y="52" text-anchor="middle" fill="#94a3b8" font-size="11">ConversationStore (sessions)</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- CRATE COUNT -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <text x="600" y="1495" text-anchor="middle" fill="#475569" font-size="12">46 Rust crates · 20k+ tests · Tauri 2.0 · Vite 8 · React 18 · SochDB embedded ACID</text>
  <text x="600" y="1520" text-anchor="middle" fill="#334155" font-size="11">© 2026 ClawDesk — All layers implement the Henrique Sánchez &amp; Hayen Mill framework</text>

</svg>
